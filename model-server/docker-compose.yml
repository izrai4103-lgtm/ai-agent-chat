services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    environment:
      OLLAMA_CONTEXT_LENGTH: "128"
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_MAX_LOADED_MODELS: "1"
      OLLAMA_KEEP_ALIVE: "10m"
    volumes:
      - ollama-models:/root/.ollama
    expose:
      - "11434"

  gateway:
    build: .
    restart: unless-stopped
    depends_on:
      - ollama
    environment:
      PORT: "8080"
      HERMES_MODEL: "gemma2:2b"
      HERMES_UPSTREAM_URL: "http://ollama:11434"
      HERMES_UPSTREAM_MODE: "ollama"
      HERMES_NUM_CTX: "128"
      HERMES_NUM_THREAD: "2"
      HERMES_NUM_PREDICT: "16"
      HERMES_UPSTREAM_TIMEOUT_MS: "4500"
      # Optional legal fast endpoint for real answers under 5 seconds.
      # HERMES_FAST_UPSTREAM_URL: "https://api.groq.com/openai/v1"
      # HERMES_FAST_MODEL: "llama-3.1-8b-instant"
      # HERMES_FAST_UPSTREAM_KEY: "${HERMES_FAST_UPSTREAM_KEY}"
      # HERMES_FAST_PRIMARY: "1"
      CORS_ORIGINS: "https://izrai4103-lgtm.github.io,http://localhost:*,http://127.0.0.1:*"
    ports:
      - "8080:8080"

volumes:
  ollama-models:
